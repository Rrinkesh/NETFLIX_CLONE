<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Popup</title>
    <style>
        /* Style for thumbnail images */
        .thumbnail {
            width: 200px;
            cursor: pointer;
        }

        /* Fullscreen overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* Targeting overlay when linked */
        .overlay:target {
            display: flex;
        }

        /* Style for enlarged image */
        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
        }

        /* Close button */
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            color: white;
            font-size: 30px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Thumbnail Image -->
    <a href="#fullimage">
        <img src="small-image.jpg" alt="Click to enlarge" class="thumbnail">
    </a>

    <!-- Fullscreen Image Overlay -->
    <div id="fullimage" class="overlay">
        <a href="#" class="close">&times;</a>
        <img src="large-image.jpg" alt="Full Image">
    </div>

</body>
</html>
